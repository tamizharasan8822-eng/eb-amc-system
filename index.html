<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EB AMC Field Complaint Book</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background-color: #ffffff; padding: 30px; border-radius: 12px; box-shadow: 0 6px 20px rgba(0, 0, 0, 0.1); width: 100%; max-width: 550px; box-sizing: border-box; }
        h2 { text-align: center; color: #d35400; margin-bottom: 25px; font-size: 24px; border-bottom: 3px solid #f1c40f; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
        h3 { color: #2c3e50; margin-top: 35px; margin-bottom: 15px; font-size: 20px; border-left: 4px solid #d35400; padding-left: 8px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; color: #34495e; font-weight: 600; font-size: 14px; }
        input[type="text"], input[type="tel"], select, textarea { width: 100%; padding: 12px; border: 1px solid #bdc3c7; border-radius: 6px; box-sizing: border-box; font-size: 14px; transition: all 0.3s; }
        input[type="text"]:focus, input[type="tel"]:focus, select:focus, textarea:focus { border-color: #d35400; outline: none; box-shadow: 0 0 5px rgba(211, 84, 0, 0.2); }
        textarea { resize: vertical; }
        input[type="file"] { padding: 5px 0; }
        button { width: 100%; padding: 14px; background-color: #d35400; color: white; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background-color 0.3s; margin-top: 10px; }
        button:hover { background-color: #e67e22; }
        .btn-track { background-color: #2c3e50; }
        .btn-track:hover { background-color: #34495e; }
        .alert { padding: 15px; border-radius: 6px; font-size: 14px; margin-top: 15px; display: none; line-height: 1.6; }
        .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .required-star { color: #e74c3c; margin-left: 3px; }
        .status-badge { background-color: #f1c40f; color: #2c3e50; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>⚡ EB - AMC Complaint Register</h2>
    <form id="grievanceForm" onsubmit="submitGrievance(); return false;">
        
        <div class="form-group">
            <label for="clientName">Consumer / Site Name (EB கஸ்டமர் பெயர்):<span class="required-star">*</span></label>
            <input type="text" id="clientName" required placeholder="e.g., Sri Lakshmi Textiles / SS Name">
        </div>

        <div class="form-group">
            <label for="ebServiceNo">EB Service / Consumer No:<span class="required-star">*</span></label>
            <input type="text" id="ebServiceNo" required placeholder="e.g., 04-234-001-1234">
        </div>

        <div class="form-group">
            <label for="clientPhone">Site Contact Number (மொபைல் எண்):<span class="required-star">*</span></label>
            <input type="tel" id="clientPhone" required placeholder="e.g., 9876543210" pattern="[0-9]{10}">
        </div>

        <div class="form-group">
            <label for="breakerType">Select Breaker Type (ELCB / RCCB):<span class="required-star">*</span></label>
            <select id="breakerType" required>
                <option value="">-- Select Breaker --</option>
                <option value="RCCB Faulty">RCCB (பழுது/ட்ரிப் ஆகிறது)</option>
                <option value="ELCB Faulty">ELCB (பழுது/மின் கசிவு)</option>
                <option value="VCB / ACB Issue">VCB / ACB Panel Issue</option>
                <option value="No Breaker Installed">No Breaker Installed (பிரேக்கர் இல்லை)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="earthCondition">Earth Condition (எர்த் நிலை):<span class="required-star">*</span></label>
            <select id="earthCondition" required>
                <option value="">-- Select Condition --</option>
                <option value="Good Condition">Good Earth Value (சரியான நிலையில் உள்ளது)</option>
                <option value="Weak Earth / High Resistance">Weak Earth (எர்த் ரெசிஸ்டன்ஸ் அதிகம்)</option>
                <option value="No Earth Connection">No Earth / Open (எர்த் கட் ஆகியுள்ளது)</option>
                <option value="Not Checked">Not Checked (பரிசோதிக்கப்படவில்லை)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="complaintDetails">Grievance / Fault Description:<span class="required-star">*</span></label>
            <textarea id="complaintDetails" rows="4" required placeholder="Fault விவரங்களை இங்கே தெளிவாக டைப் செய்யவும்..."></textarea>
        </div>

        <div class="form-group">
            <label for="complaintPhoto">Upload Site Photo / Proof:<span class="required-star">*</span></label>
            <input type="file" id="complaintPhoto" accept="image/*" required>
        </div>

        <button type="submit">⚡ Book AMC Complaint Ticket</button>
        <div id="regResult" class="alert"></div>
    </form>

    <hr style="margin-top: 30px; border: 0; border-top: 1px dashed #bdc3c7;">

    <h3>🔍 Track AMC Ticket Status (புகாரின் நிலை அறிதல்)</h3>
    <div class="form-group">
        <label for="trackId">Enter AMC Ticket Number:</label>
        <input type="text" id="trackId" placeholder="e.g., AMC123456">
    </div>
    <button class="btn-track" onclick="trackGrievance()">Check Office Database</button>
    <div id="trackResult" class="alert"></div>
</div>

<script>
    function submitGrievance() {
        const name = document.getElementById('clientName').value;
        const ebNo = document.getElementById('ebServiceNo').value;
        const phone = document.getElementById('clientPhone').value;
        const breaker = document.getElementById('breakerType').value;
        const earth = document.getElementById('earthCondition').value;
        const details = document.getElementById('complaintDetails').value;
        const photoInput = document.getElementById('complaintPhoto');

        if (photoInput.files.length === 0) {
            alert('Please upload a Site Photo! It is mandatory.');
            return;
        }

        const generatedId = "AMC" + Math.floor(100000 + Math.random() * 900000);

        const complaintData = {
            id: generatedId,
            clientName: name,
            ebServiceNo: ebNo,
            clientPhone: phone,
            breakerType: breaker,
            earthCondition: earth,
            description: details,
            status: "Open / Assigned to Team",
            date: new Date().toLocaleDateString()
        };

        let localDB = JSON.parse(localStorage.getItem('eb_amc_db')) || [];
        localDB.push(complaintData);
        localStorage.setItem('eb_amc_db', JSON.stringify(localDB));

        alert(`⚡ EB-AMC Complaint Registered Successfully!\n\nYour Ticket ID is: ${generatedId}\n\nSaved successfully in Cloud-Safe Browser Storage.`);
        document.getElementById('grievanceForm').reset();
    }

    function trackGrievance() {
        const trackId = document.getElementById('trackId').value.trim().toUpperCase();
        const trackResult = document.getElementById('trackResult');
        
        if(!trackId) {
            alert('Please enter an AMC Ticket ID');
            return;
        }

        let localDB = JSON.parse(localStorage.getItem('eb_amc_db')) || [];
        const foundTicket = localDB.find(ticket => ticket.id === trackId);

        trackResult.style.display = 'block';

        if (foundTicket) {
            trackResult.className = 'alert alert-success';
            trackResult.innerHTML = `
                <div style="text-align: left; color: #2c3e50;">
                    <p style="margin: 5px 0;"><strong>🎟 Ticket ID:</strong> <span style="color:#d35400; font-weight:bold;">${foundTicket.id}</span></p>
                    <p style="margin: 5px 0;"><strong>👤 Consumer Name:</strong> ${foundTicket.clientName}</p>
                    <p style="margin: 5px 0;"><strong>⚡ EB Service No:</strong> ${foundTicket.ebServiceNo}</p>
                    <p style="margin: 5px 0;"><strong>📞 Contact No:</strong> ${foundTicket.clientPhone}</p>
                    <p style="margin: 5px 0;"><strong>🔌 Breaker Type:</strong> ${foundTicket.breakerType}</p>
                    <p style="margin: 5px 0;"><strong>🌍 Earth Status:</strong> ${foundTicket.earthCondition}</p>
                    <p style="margin: 5px 0;"><strong>📝 Fault Details:</strong> ${foundTicket.description}</p>
                    <p style="margin: 5px 0;"><strong>📅 Booked Date:</strong> ${foundTicket.date}</p>
                    <p style="margin: 10px 0 0 0; border-top: 1px dashed #bdc3c7; padding-top: 8px;">
                        <strong>🟢 AMC Status:</strong> <span class="status-badge">${foundTicket.status}</span>
                    </p>
                </div>
            `;
        } else {
            trackResult.className = 'alert alert-danger';
            trackResult.innerHTML = `<strong>❌ AMC Ticket ID Not Found!</strong>`;
        }
    }
</script>

</body>
</html>
